<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Eigo DE Quest - 第1章</title>
    <style>
        /* ドラクエ風のシンプルなUIスタイル */
        body { background-color: #111; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; margin: 0; }
        #game-screen { width: 90%; max-width: 600px; border: 3px solid #eee; border-radius: 10px; padding: 20px; background-color: #000; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        
        /* 画像が入る予定の空枠 */
        #image-placeholder { height: 250px; border: 2px dashed #555; display: flex; justify-content: center; align-items: center; color: #888; margin-bottom: 20px; font-size: 14px; background-color: #222;}
        
        /* システム・NPC用のメッセージウィンドウ */
        #message-window { border: 2px solid #eee; border-radius: 5px; padding: 15px; min-height: 100px; position: relative; margin-bottom: 15px; }
        #speaker-name { color: #ffd700; font-weight: bold; font-size: 18px; margin-bottom: 10px; display: block; }
        #message-text { font-size: 18px; line-height: 1.5; }
        
        /* ボタンエリア */
        #controls { margin-top: 10px; text-align: center; height: 60px; }
        button { background-color: #333; color: #fff; border: 2px solid #fff; border-radius: 5px; padding: 15px 20px; font-size: 18px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { background-color: #555; }
        #mic-btn { background-color: #aa0000; display: none; width: 80%; max-width: 400px; }
        #mic-btn:hover { background-color: #cc0000; }

        /* 状態・判定結果表示（通常画面用） */
        #status-text { margin-top: 15px; color: #ffcc00; font-size: 16px; font-weight: bold; text-align: center; height: 25px;}

        /* ★ドカンと出る全画面マイクオーバーレイ */
        #mic-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); 
            z-index: 1000; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }
        #mic-listening-text {
            color: #ff5555; font-size: 40px; font-weight: bold; margin-bottom: 30px;
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        
        /* デカデカと出る生徒用の発話表示ウィンドウ */
        #player-message-large {
            border: 4px solid #4da6ff; border-radius: 15px; padding: 40px; 
            background-color: rgba(77, 166, 255, 0.2); 
            text-align: center; display: none; width: 80%; max-width: 500px;
            box-shadow: 0 0 30px rgba(77, 166, 255, 0.5);
        }
        #player-name-large { color: #4da6ff; font-weight: bold; font-size: 24px; display: block; margin-bottom: 15px; }
        #player-text-large { font-size: 50px; font-weight: bold; color: #fff; line-height: 1.2; }
        
        /* デカデカ判定結果 */
        #judge-result-large { font-size: 50px; font-weight: bold; margin-top: 30px; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="image-placeholder">【背景：都会の部屋】</div>
        
        <div id="message-window">
            <span id="speaker-name">システム</span>
            <span id="message-text">都会の朝。枕元に見覚えのない地図がある...「Go to the forest.」</span>
        </div>
        
        <div id="controls">
            <button id="next-btn" onclick="nextScene()">次へ ▼</button>
            <button id="mic-btn" onclick="startMic()">🎤 ボタンを押して英語を叫ぶ！</button>
        </div>
    </div>
    
    <div id="status-text"></div>

    <!-- ドカンと出る全画面マイクオーバーレイ -->
    <div id="mic-overlay">
        <div id="mic-listening-text">🎤 今、話してください！</div>
        
        <div id="player-message-large">
            <span id="player-name-large">マスター（あなた）</span>
            <span id="player-text-large"></span>
        </div>
        
        <div id="judge-result-large"></div>
    </div>

    <script>
        // --- 状態管理（シーン）---
        let currentScene = 0;
        let playerName = "";

        // UI要素の取得
        const speakerEl = document.getElementById("speaker-name");
        const textEl = document.getElementById("message-text");
        const nextBtn = document.getElementById("next-btn");
        const micBtn = document.getElementById("mic-btn");
        const placeholderEl = document.getElementById("image-placeholder");
        const statusEl = document.getElementById("status-text");
        
        // オーバーレイ要素の取得
        const overlayEl = document.getElementById("mic-overlay");
        const listeningTextEl = document.getElementById("mic-listening-text");
        const playerWindowLargeEl = document.getElementById("player-message-large");
        const playerNameLargeEl = document.getElementById("player-name-large");
        const playerTextLargeEl = document.getElementById("player-text-large");
        const judgeResultLargeEl = document.getElementById("judge-result-large");

        // 音声認識の設定
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;

        function nextScene() {
            currentScene++;
            updateScene();
        }

        function updateScene() {
            nextBtn.style.display = "inline-block";
            micBtn.style.display = "none";
            statusEl.innerText = "";

            switch (currentScene) {
                case 1:
                    placeholderEl.innerText = "【背景：都会➔田舎➔森へグラデーション移動】";
                    speakerEl.innerText = "システム";
                    textEl.innerText = "地図が示す不思議な森の入り口へ向かう...景色が変わっていく。";
                    break;
                case 2:
                    placeholderEl.innerText = "【画像：pico_08.png (電池切れのピコ)】";
                    speakerEl.innerText = "システム";
                    textEl.innerHTML = "森の広場で、電池切れで眠っている可愛いロボットを見つけた。<br><br><b>Say 'Hello'!（マイクで叫んで起動させよう！）</b>";
                    nextBtn.style.display = "none";
                    micBtn.style.display = "inline-block";
                    setupMic(["hello", "はろー", "pico", "ピコ", "ぴこ", "school", "pickle", "peaco", "google"], 3); 
                    break;
                case 3:
                    placeholderEl.innerText = "【画像：pico_02.png (大喜びのピコ)】";
                    speakerEl.innerText = "ピコ";
                    textEl.innerText = "「マスター！声を聞かせてくれてありがとう！ボクはピコ、よろしくね！」";
                    break;
                case 4:
                    placeholderEl.innerText = "【画像：kong_10.png (威嚇するコング)】\n※地鳴りの音";
                    speakerEl.innerText = "コング (大怪獣)";
                    textEl.innerText = "「WHERE ARE YOU FROM!? (お前はどこから来た！？)」";
                    break;
                case 5:
                    placeholderEl.innerText = "【画像：pico_01.png】";
                    speakerEl.innerText = "ピコ";
                    textEl.innerText = "「マスター！ビビらずに 'Japan' って叫ぶんだ！」";
                    nextBtn.style.display = "none";
                    micBtn.style.display = "inline-block";
                    setupMic(["japan", "じゃぱん", "ジャパン"], 6); 
                    break;
                case 6:
                    placeholderEl.innerText = "【画像：kong_06.png (大号泣するコング)】";
                    speakerEl.innerText = "コング";
                    textEl.innerText = "「俺の外見を見て逃げ出さずに答えてくれた...！！(滝のような涙)」";
                    break;
                case 7:
                    placeholderEl.innerText = "【画像：kong_01.png】";
                    speakerEl.innerText = "コング";
                    textEl.innerText = "「What's your name? (お前の名前はなんだ？)」\n※マイクで自分の名前を教えてあげよう！";
                    nextBtn.style.display = "none";
                    micBtn.style.display = "inline-block";
                    recognition.lang = 'ja-JP'; 
                    setupMic(["ANY"], 8); 
                    break;
                case 8:
                    placeholderEl.innerText = "【画像：kong_02.png (大喜びのコング)】";
                    speakerEl.innerText = "コング";
                    textEl.innerText = `「${playerName}!? Are you my friend!? (俺の友達か！？)」`;
                    nextBtn.style.display = "none";
                    micBtn.style.display = "inline-block";
                    recognition.lang = 'en-US'; 
                    setupMic(["yes", "いえす", "イエス"], 9); 
                    break;
                case 9:
                    placeholderEl.innerText = "【仲間合流のファンファーレ】";
                    speakerEl.innerText = "システム";
                    textEl.innerText = "コングが仲間になった！\n\n第1章クリア！！";
                    nextBtn.style.display = "none";
                    micBtn.style.display = "none";
                    statusEl.innerHTML = "<button onclick='alert(\"Googleサイトの目次へ戻ります\")'>次の冒険へ進む</button>";
                    break;
            }
        }

        // --- 音声認識と判定ロジック ---
        let targetWordsArray = [];
        let nextSceneNum = 0;

        function setupMic(wordsArray, next) {
            targetWordsArray = wordsArray; 
            nextSceneNum = next;
        }

        function startMic() {
            overlayEl.style.display = "flex";
            listeningTextEl.style.display = "block";
            playerWindowLargeEl.style.display = "none";
            judgeResultLargeEl.innerText = "";
            recognition.start();
        }

        recognition.onresult = function(event) {
            // ★【今度こそ確実に修正！！】  を入れて正しく文字を取り出します！
            let transcript = event.results.transcript;
            
            listeningTextEl.style.display = "none";
            playerWindowLargeEl.style.display = "block";
            
            playerNameLargeEl.innerText = playerName ? playerName : "マスター（あなた）";
            playerTextLargeEl.innerText = `「${transcript}」`;
            
            let cleanedText = transcript.toLowerCase().replace(/[^a-z0-9ぁ-んァ-ヶｱ-ﾝﾞﾟ一-龠]/g, "");
            
            if (targetWordsArray.includes("ANY")) {
                playerName = transcript;
                localStorage.setItem("EigoQuest_PlayerName", playerName); 
                judgeResultLargeEl.style.color = "#ffcc00";
                judgeResultLargeEl.innerText = "🌟 大成功！！";
                setTimeout(closeOverlayAndProceed, 2000);
            } else {
                let isHit = targetWordsArray.some(word => cleanedText.includes(word));
                
                if (isHit) {
                    judgeResultLargeEl.style.color = "#ffcc00";
                    judgeResultLargeEl.innerText = "🌟 大成功！！";
                    setTimeout(closeOverlayAndProceed, 2500); 
                } else {
                    judgeResultLargeEl.style.color = "#ff5555";
                    judgeResultLargeEl.innerText = "❌ 辞書にない言葉みたい！もう一度！";
                    setTimeout(closeOverlayAndRetry, 2500);
                }
            }
        };

        recognition.onerror = function(event) {
            listeningTextEl.style.display = "none";
            judgeResultLargeEl.style.color = "#ff5555";
            judgeResultLargeEl.innerText = "❌ うまく聞き取れませんでした...";
            playerWindowLargeEl.style.display = "block";
            playerNameLargeEl.innerText = "システム";
            playerTextLargeEl.innerText = "「音声が検出できませんでした」";
            setTimeout(closeOverlayAndRetry, 2500);
        };

        function closeOverlayAndProceed() {
            overlayEl.style.display = "none";
            currentScene = nextSceneNum;
            updateScene();
        }

        function closeOverlayAndRetry() {
            overlayEl.style.display = "none";
            statusEl.innerText = "もう一度「🎤 ボタンを押して」叫んでみて！";
        }
    </script>
</body>
</html>
