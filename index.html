<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eigo DE Quest - Official Final Version</title>
    <style>
        /* ゲーム画面全体のデザイン（黒ベースでグラフィックを際立たせる） */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 16:9のゲーム画面枠（グラフィックが綺麗に収まるエリア） */
        #game-container {
            width: 1024px;
            height: 576px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px solid #333;
        }

        /* 背景画像のスタイル（都会・郊外・田舎・森が綺麗に切り替わる） */
        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
            z-index: 1;
        }
        .background-layer.active {
            opacity: 1;
        }

        /* キャラクター画像（ピコやコング）の表示エリア */
        .character-layer {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            height: 320px;
            z-index: 2;
            transition: all 0.5s ease;
            display: none;
        }

        /* 下部に表示される黒い映画風のセリフウィンドウ */
        #text-box {
            position: absolute;
            bottom: 15px;
            left: 20px;
            width: 984px;
            height: 110px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #D4A373;
            border-radius: 10px;
            padding: 15px 25px;
            box-sizing: border-box;
            z-index: 10;
        }

        #speaker-name {
            font-size: 18px;
            font-weight: bold;
            color: #D4A373;
            margin-bottom: 5px;
        }

        #dialogue-text {
            font-size: 20px;
            line-height: 1.4;
            color: #fff;
        }

        /* 画面中央にデカデカと出る英語の文字誘導 */
        #english-hint {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #FFF;
            text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 5px #D4A373;
            text-align: center;
            z-index: 15;
            display: none;
        }

        /* マイクの状態（録音中・待機中）を示すインジケーター */
        #mic-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            z-index: 20;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* スタート画面の特大ボタン */
        #start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            font-size: 32px;
            font-weight: bold;
            background: #1B4332;
            color: #fff;
            border: 3px solid #D4A373;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="bg-room" class="background-layer active" style="background-color: #222;"></div>
    <div id="bg-suburb" class="background-layer" style="background-color: #334;"></div>
    <div id="bg-country" class="background-layer" style="background-color: #353;"></div>
    <div id="bg-forest" class="background-layer" style="background-color: #132;"></div>

    <img id="char-img" class="character-layer" src="" alt="character">

    <div id="english-hint">Say "Hello"!</div>

    <div id="mic-status">🎙️ マイク受付中... 声を出してください</div>

    <div id="text-box">
        <div id="speaker-name">システム</div>
        <div id="dialogue-text">画面中央のSTARTを押して冒険を始めよう！</div>
    </div>

    <button id="start-button" onclick="startGame()">START</button>
</div>

<script>
    // 進行を管理する変数
    let currentScene = 0;
    let playerName = "";

    // 音声合成（ピコやコングの声をブラウザに喋らせる準備）
    const synth = window.speechSynthesis;

    // マイク（音声認識）の初期設定【絶対に止まらないようにエラーハンドリングを強化】
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // 基本は英語モード
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // 音声認識が完了した時の処理
        recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript.toLowerCase();
            console.log("認識された声: " + speechResult);
            handleSpeechInput(speechResult);
        };

        // エラーが出てもフリーズさせず、もう一度マイクを構え直す
        recognition.onerror = (event) => {
            console.log("マイクエラー発生: " + event.error);
            // 止まってしまったら、現在のシーンに合わせてマイクを自動再起動
            setTimeout(() => { startListening(); }, 1000);
        };

        recognition.onend = () => {
            document.getElementById("mic-status").style.display = "none";
        };
    }

    // ゲームスタート
    function startGame() {
        document.getElementById("start-button").style.display = "none";
        nextScene();
    }

    // シナリオ進行の心臓部
    function nextScene() {
        currentScene++;
        const speaker = document.getElementById("speaker-name");
        const text = document.getElementById("dialogue-text");
        const hint = document.getElementById("english-hint");
        const charImg = document.getElementById("char-img");

        // シーン1：朝の目覚めと地図（グラデーション移動）
        if (currentScene === 1) {
            speaker.innerText = "ナレーション";
            text.innerText = "都会の自分の部屋で目覚めると、枕元に謎の「メモ」と「古びた地図」が置かれていた。地図がかすかに光り出す...";
            
            // 3秒かけて都会➔郊外➔田舎➔森へと背景色（グラデーション）を変えていく演出
            setTimeout(() => { changeBG("bg-suburb"); text.innerText = "導かれるように部屋を飛び出し、都会から郊外へ..."; }, 1500);
            setTimeout(() => { changeBG("bg-country"); text.innerText = "ビルが消え、郊外からのどかな田舎道へ..."; }, 3000);
            setTimeout(() => { changeBG("bg-forest"); text.innerText = "そしてついに、未知の森へと足を踏み入れた。"; }, 4500);
            setTimeout(() => { nextScene(); }, 6500);
        }
        
        // シーン2：ピコの起動
        else if (currentScene === 2) {
            speaker.innerText = "ナレーション";
            text.innerText = "森の広場で、シルバーカラーの可愛いマスコットロボットを発見した。画面に何かが表示されている。";
            hint.innerText = 'Say "Hello"!';
            hint.style.display = "block";
            
            // マイクオン（生徒にHello!と叫ばせる）
            setTimeout(() => { startListening('en'); }, 2000);
        }
        
        // シーン2の続き：ピコの大絶賛
        else if (currentScene === 3) {
            hint.style.display = "none";
            speaker.innerText = "ピコ";
            text.innerText = "「天才じゃない！？これからよろしくね、マスター！これからは英語しか通じない世界。でも大丈夫。僕がサポートするからね。」";
            speakJapanese("天才じゃない！？これからよろしくね、マスター！これからは英語しか通じない世界。でも大丈夫。僕がサポートするからね。");
            
            setTimeout(() => { nextScene(); }, 7000);
        }

        // シーン3：巨獣コングとの遭遇
        else if (currentScene === 4) {
            speaker.innerText = "コング";
            text.innerText = '"WHERE ARE YOU FROM!?" (地鳴りのような重低音ボイス！)';
            speakEnglish("WHERE ARE YOU FROM!?");
            
            // ⏰ 2秒の沈黙（リスニング即答タイム）
            setTimeout(() => {
                // 生徒が黙っていたら、シーン4（ピコのサゼッション）へ自動移行
                if (currentScene === 4) { nextScene(); }
            }, 3000);
        }

        // シーン4：ピコのサゼッション
        else if (currentScene === 5) {
            speaker.innerText = "ピコ";
            text.innerText = "「どこからきたか聞いているよ？『Japan!』と言ってみよう！」";
            speakJapanese("どこからきたか聞いているよ？ジャパンと言ってみよう！");
            hint.innerText = '"Japan!"';
            hint.style.display = "block";
            
            // マイクオン（Japan待ち）
            setTimeout(() => { startListening('en'); }, 2000);
        }

        // シーン5：奇跡の大どんでん返し
        else if (currentScene === 6) {
            hint.style.display = "none";
            speaker.innerText = "コング";
            text.innerText = "「（大号泣）俺の外見を見て逃げずに答えてくれた…！」";
            speakEnglish("My body is so big. But I am very shy. I want friends. But I say something, people go away... why?");
            text.innerText = '"My body is so big. But I am very shy. I want friends. But I say something, people go away... why?"';
            
            setTimeout(() => { nextScene(); }, 8000);
        }

        // シーン6：運命のYes
        else if (currentScene === 7) {
            speaker.innerText = "コング";
            text.innerText = '"Friend!? Are you my friend?" (切実に見つめてくる)';
            speakEnglish("Friend!? Are you my friend?");
            
            // ピコの間髪入れないサポート
            setTimeout(() => {
                speaker.innerText = "ピコ";
                text.innerText = "「コングは『君は僕の友達になってくれる？』って聞いてるよ！『Yes!』って叫んであげて！」";
                speakJapanese("コングは君は僕の友達になってくれるって聞いてるよ！イエスって叫んであげて！");
                hint.innerText = '"Yes!"';
                hint.style.display = "block";
                startListening('en');
            }, 3000);
        }

        // シーン6続き：名前の登録
        else if (currentScene === 8) {
            hint.style.display = "none";
            speaker.innerText = "コング";
            text.innerText = '"Thank you...! What\'s your name?" (音楽が大転調！コングが笑顔になる)';
            speakEnglish("Thank you! What's your name?");
            
            setTimeout(() => {
                speaker.innerText = "ピコ";
                text.innerText = "「マスター！マイクに向かって、君の名前を英語っぽく叫んでみて！」";
                speakJapanese("マスター！マイクに向かって、君の名前を叫んでみて！");
                startListening('name'); // 名前登録のための日本語/英語ミックス認識モード
            }, 3000);
        }

        // 第2章の幕開け：偽村人ストーリーへ
        else if (currentScene === 9) {
            speaker.innerText = "コング";
            text.innerText = `「よし、いこう、${playerName}！」`;
            speakEnglish(`OK, let's go, ${playerName}!`);
            
            setTimeout(() => {
                speaker.innerText = "ナレーション";
                text.innerText = "コングが仲間になり、心強くなったのも束の間。前方の霧の中から、怪しげな影が近づいてくる……。第2章『偽村人ジェン』へ続く！";
            }, 3000);
        }
    }

    // マイクの受付を開始する関数
    function startListening(mode) {
        if (!recognition) return;
        document.getElementById("mic-status").style.display = "block";
        
        if (mode === 'name') {
            recognition.lang = 'ja-JP'; // 名前は日本語環境のアルファベット入力にも対応させる
        } else {
            recognition.lang = 'en-US';
        }
        
        try {
            recognition.start();
        } catch(e) {
            // すでに動いている場合は一度止めて再起動
            recognition.stop();
            setTimeout(() => { recognition.start(); }, 4000);
        }
    }

    // 生徒の声が聞こえたら、中身をチェックして次に進める関数
    function handleSpeechInput(result) {
        // シーン2：Hello待ち
        if (currentScene === 2 && (result.includes("hello") || result.includes("herro") || result.includes("ハロー"))) {
            nextScene();
        }
        // シーン5：Japan待ち
        else if (currentScene === 5 && (result.includes("japan") || result.includes("ジャパン"))) {
            nextScene();
        }
        // シーン7：Yes待ち
        else if (currentScene === 7 && (result.includes("yes") || result.includes("イエス"))) {
            nextScene();
        }
        // シーン8：名前登録
        else if (currentScene === 8) {
            playerName = result.toUpperCase();
            nextScene();
        } else {
            // 違う言葉だった場合は、マイクをもう一度オープンしてあげる（フリーズ対策）
            console.log("キーワードが一致しませんでした。もう一度マイクをオンにします。");
            startListening();
        }
    }

    // 背景切り替え関数
    function changeBG(bgId) {
        const layers = document.querySelectorAll('.background-layer');
        layers.forEach(layer => layer.classList.remove('active'));
        document.getElementById(bgId).classList.add('active');
    }

    // パソコンに日本語を喋らせる関数
    function speakJapanese(msg) {
        if (!synth) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(msg);
        utter.lang = 'ja-JP';
        utter.rate = 1.0;
        synth.speak(utter);
    }

    // パソコンに英語（コングなどの重低音）を喋らせる関数
    function speakEnglish(msg) {
        if (!synth) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(msg);
        utter.lang = 'en-US';
        utter.rate = 0.8; // コングっぽく少し低めでゆっくり喋らせる
        utter.pitch = 0.7;
        synth.speak(utter);
    }
</script>

</body>
</html>
