<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eigo DE Quest</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 600px;
            background-color: #111;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        /* 背景画像：JPEG形式でも動くように調整しました */
        #bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 先生が保存した画像が.jpgでも.jpegでも反応するようにしています */
            background-image: url('images/ch1_bg_forest.jpg'), url('images/ch1_bg_forest.jpeg');
            background-size: cover;
            background-position: center;
            transform: scale(1.1);
            transition: transform 8s ease-out;
        }
        #bg-image.zoom {
            transform: scale(1.0);
        }
        #layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
        }
        #title-logo {
            position: absolute;
            top: 15%; width: 100%; text-align: center;
            color: #fff; font-size: 3rem; font-weight: bold;
            letter-spacing: 5px; text-shadow: 0 0 15px rgba(255,215,0,0.6);
            opacity: 0; transform: translateY(-20px);
            transition: all 2s ease-out;
        }
        #title-logo.show { opacity: 1; transform: translateY(0); }
        #subtitle-box {
            position: absolute;
            bottom: 15%; left: 5%; width: 90%;
            text-align: center; min-height: 80px;
            display: flex; justify-content: center; align-items: center;
        }
        .subtitle {
            color: #fff; font-size: 1.5rem; line-height: 1.8;
            font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,1);
            opacity: 0; transform: scale(0.95);
            transition: all 1.5s ease; position: absolute; width: 100%;
        }
        .subtitle.show { opacity: 1; transform: scale(1); }
        #start-btn {
            position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; color: #fff;
            background: linear-gradient(45deg, #ff4500, #ff8c00); border: none; border-radius: 30px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255,69,0,0.4); display: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="bg-image"></div>
    <div id="layer"></div>
    <div id="title-logo">Eigo DE Quest</div>
    
    <div id="subtitle-box">
        <div class="subtitle" id="line1">ある朝、目が覚めると……</div>
        <div class="subtitle" id="line2">机の上に、見慣れない「古い地図」が置いてあった。</div>
        <div class="subtitle" id="line3">「…コングの森へ来い。待っている…」</div>
        <div class="subtitle" id="line4">不気味な声に導かれ、君の冒険が今、始まる！</div>
    </div>

    <button id="start-btn" onclick="alert('ここからピコとの出会い（第1章）へ繋がります！')">冒険を始める</button>
</div>

<script>
    window.onload = function() {
        const bg = document.getElementById('bg-image');
        const logo = document.getElementById('title-logo');
        
        setTimeout(() => { bg.classList.add('zoom'); }, 100);
        setTimeout(() => { logo.classList.add('show'); }, 1000);
        
        showLine('line1', 3000, 3000);
        showLine('line2', 6500, 4000);
        showLine('line3', 11000, 3500);
        showLine('line4', 15000, 4000);
        
        setTimeout(() => {
            document.getElementById('start-btn').style.display = 'block';
        }, 19500);
    };

    function showLine(id, delay, duration) {
        setTimeout(() => {
            const el = document.getElementById(id);
            el.classList.add('show');
            setTimeout(() => {
                el.classList.remove('show');
            }, duration);
        }, delay);
    }
</script>
</body>
</html>
